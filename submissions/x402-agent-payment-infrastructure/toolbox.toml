[tool]
name = "x402-agent-payment-infrastructure"
version = "0.1.1"
description = "x402/MCP layer for paid AI/data calls, crypto conversion quotes, progress streams, receipts, and safe agent spend governance."
author = "Wisely Enterprises LLC"

[binary]
entry = "remote-mcp"
platforms = ["remote-http"]

[permissions]
filesystem = []
network = true
env_vars = []

[distribution]
binary_url = "https://payments.wiselyenterprisesllc.com/ai/mcp"
sha512 = ""

[[mcp.tools]]
name = "agent_payment_manifest"
description = "Return public service, MCP, and x402 payment metadata for the agent-payment infrastructure."

[[mcp.tools]]
name = "quote_service"
description = "Quote paid AI/data service calls and crypto conversion routes into required settlement assets."

[[mcp.tools]]
name = "invoke_service"
description = "Invoke a paid AI/data service after x402 payment proof or an authorized developer-credit key."

[[mcp.tools]]
name = "purchase_credits"
description = "Purchase reusable developer credits through x402/Base USDC."

[[mcp.tools]]
name = "credit_status"
description = "Check developer-credit balances and spend state."

[[mcp.tools]]
name = "get_receipt"
description = "Fetch receipt and proof records for prior paid calls."

[[mcp.tools]]
name = "quote_external_x402"
description = "Quote an external x402 seller or resource and return payment requirements for caller-side wallet signing."
