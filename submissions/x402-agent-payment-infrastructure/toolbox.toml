[tool]
name = "x402-agent-payment-infrastructure"
version = "0.1.2"
description = "Remote x402/MCP spend layer for AI agents: quote paid AI/API calls, probe external sellers, route crypto conversion, create hosted endpoints, stream progress, and return receipts/logs."
author = "Wisely Enterprises LLC"

[binary]
entry = "remote-mcp"
platforms = ["remote-http"]

[permissions]
filesystem = []
network = true
env_vars = []

[distribution]
binary_url = "https://payments.wiselyenterprisesllc.com/ai/mcp"
sha512 = ""

[[mcp.tools]]
name = "agent_payment_manifest"
description = "Return public service, MCP, docs, and x402 payment metadata for the agent-payment infrastructure."

[[mcp.tools]]
name = "quote_service"
description = "Quote paid AI/data service calls and crypto conversion routes into required settlement assets."

[[mcp.tools]]
name = "invoke_service"
description = "Invoke a paid AI/data service after x402 payment proof or an authorized developer-credit key."

[[mcp.tools]]
name = "purchase_credits"
description = "Purchase reusable developer credits through x402/Base USDC."

[[mcp.tools]]
name = "credit_status"
description = "Check developer-credit balances and spend state."

[[mcp.tools]]
name = "get_receipt"
description = "Fetch receipt and proof records for prior paid calls."

[[mcp.tools]]
name = "quote_external_x402"
description = "Quote an external x402 seller or resource and return payment requirements for caller-side wallet signing."

[[mcp.tools]]
name = "endpoint_catalog"
description = "List hosted paid x402 endpoints and public endpoint metadata."

[[mcp.tools]]
name = "endpoint_create_handoff"
description = "Return the safe builder-key/console handoff for creating or updating hosted paid endpoints."
